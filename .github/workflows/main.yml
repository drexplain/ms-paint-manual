name: AI Improve Documentation

on:
  push:
    paths: ['docs/*.md']
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: AI Processing
        id: ai
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Читаем и проверяем исходник
          TEXT_CONTENT=$(cat docs/paint-manual.md | jq -aRs .)
          echo "Файл прочитан успешно."

          # 2. Запрос к модели DeepSeek-V3 (она быстрее и стабильнее для тестов)
          echo "Отправка запроса в API..."
          curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"DeepSeek-V3\",
              \"messages\": [
                {\"role\": \"user\", \"content\": \"Исправь стиль этой документации: $TEXT_CONTENT\"}
              ]
            }" > response.json

          # 3. ПЕЧАТАЕМ ОТВЕТ В ЛОГИ (это решит нашу загадку)
          echo "--- ОТВЕТ СЕРВЕРА НАЧАЛО ---"
          cat response.json
          echo -e "\n--- ОТВЕТ СЕРВЕРА КОНЕЦ ---"

          # 4. Извлекаем текст
          RESULT=$(jq -r '.choices[0].message.content' response.json)

          if [ "$RESULT" == "null" ] || [ -z "$RESULT" ]; then
            echo "Ошибка: API вернул пустой результат. См. лог выше." > docs/paint-manual-improved.md
          else
            echo "$RESULT" > docs/paint-manual-improved.md
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: улучшение документации"
          title: "Предложение от AI"
          branch: "ai-patch-final"
          base: "main"
          add-paths: docs/paint-manual-improved.md
