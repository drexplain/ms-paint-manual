name: AI Improve Documentation

on:
  push:
    paths: ['docs/*.md']
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read

    steps:
      - uses: actions/checkout@v5

      - name: AI Processing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEXT=$(cat docs/paint-manual.md)
          PROMPT=$(cat .github/prompts/improve-docs.md)
          FULL_PROMPT="${PROMPT}"$'\n\n'"${TEXT}"

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$FULL_PROMPT" '{
              model: "gpt-4o-mini",
              messages: [{role: "user", content: $content}],
              temperature: 0.3,
              max_tokens: 4000
            }')")

          echo "HTTP статус: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Ошибка API" > docs/paint-manual-improved.md
            exit 1
          fi

          RESULT=$(jq -r '.choices[0].message.content' response.json)
          if [ "$RESULT" = "null" ] || [ -z "$RESULT" ]; then
            echo "Пустой ответ" > docs/paint-manual-improved.md
            exit 1
          fi

          echo "$RESULT" > docs/paint-manual-improved.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: улучшение документации"
          title: "Предложение от AI"
          branch: "ai-patch-final"
          base: ${{ github.event.repository.default_branch }}
          add-paths: docs/paint-manual-improved.md
          body: |
            Это автоматическое предложение по улучшению документации.
            Проверьте изменения и при необходимости отредактируйте.
