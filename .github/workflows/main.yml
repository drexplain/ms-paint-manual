name: AI Improve Documentation

on:
  push:
    paths: ['docs/*.md']
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Call DeepSeek via Curl
        id: ai
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Читаем файл и подготавливаем его для JSON (экранируем кавычки и переносы)
          TEXT_CONTENT=$(cat docs/paint-manual.md | jq -aRs .)

          # 2. Делаем запрос через curl с выводом ответа в файл
          curl -v -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"DeepSeek-R1\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"Ты — технический редактор. Исправь стиль текста, убери лишние слова, добавь разделы Цель и Предусловия. Выдай только исправленный Markdown.\"},
                {\"role\": \"user\", \"content\": $TEXT_CONTENT}
              ],
              \"temperature\": 0.3
            }" > response.json

          # 3. Проверяем, что пришло в ответе (для логов)
          cat response.json

          # 4. Извлекаем текст. Пробуем сначала content, если нет - reasoning_content
          RESULT=$(jq -r '.choices[0].message.content // .choices[0].message.reasoning_content' response.json)

          # 5. Если результат все еще null или пустой, записываем ошибку для диагностики
          if [ "$RESULT" == "null" ] || [ -z "$RESULT" ]; then
            echo "Ошибка: API вернул пустой ответ. Проверьте лог выше." > docs/paint-manual-improved.md
          else
            echo "$RESULT" > docs/paint-manual-improved.md
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: улучшение документации Paint"
          title: "Предложение от AI-агента"
          branch: "ai-patch"
          base: "main"
          body: "Автоматическое исправление стиля через DeepSeek-R1."
          add-paths: docs/paint-manual-improved.md
