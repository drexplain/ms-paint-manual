name: AI Improve Documentation

on:
  push:
    paths: ['docs/*.md']
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: AI Processing
        id: ai
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Читаем исходный файл
          TEXT=$(cat docs/paint-manual.md)

          # Формируем JSON и отправляем запрос
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "https://api.deepseek.com/v1/chat/completions" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$TEXT" '{
              model: "deepseek-chat",
              messages: [{role: "user", content: "Исправь стиль этой документации. Сохрани смысл, но улучши грамматику, структуру и читаемость:\n\($text)"}],
              temperature: 0.7
            }')")

          echo "HTTP статус: $HTTP_STATUS"
          echo "--- Ответ API ---"
          cat response.json
          echo "-----------------"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Ошибка API. Ответ:" > docs/paint-manual-improved.md
            cat response.json >> docs/paint-manual-improved.md
            exit 1
          fi

          # Извлекаем содержимое ответа
          RESULT=$(jq -r '.choices[0].message.content' response.json)
          if [ "$RESULT" = "null" ] || [ -z "$RESULT" ]; then
            echo "Ошибка: пустой ответ от модели" > docs/paint-manual-improved.md
            exit 1
          fi

          echo "$RESULT" > docs/paint-manual-improved.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: улучшение документации"
          title: "Предложение от AI"
          branch: "ai-patch-final"
          base: ${{ github.event.repository.default_branch }}
          add-paths: docs/paint-manual-improved.md
          body: |
            Это автоматическое предложение по улучшению документации.
            Проверьте изменения и при необходимости отредактируйте.
